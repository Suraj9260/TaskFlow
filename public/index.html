<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow — Team Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ── Reset & Base ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #0d0f14;
  --surface:   #161a23;
  --surface2:  #1e2330;
  --border:    #252b3a;
  --text:      #e8eaf0;
  --text-muted:#7a8399;
  --accent:    #4f8ef7;
  --accent2:   #7c5cfc;
  --success:   #22d3a5;
  --warn:      #f59e0b;
  --danger:    #f43f5e;
  --todo:      #7a8399;
  --inprog:    #4f8ef7;
  --review:    #f59e0b;
  --done:      #22d3a5;
  --low:       #22d3a5;
  --medium:    #4f8ef7;
  --high:      #f59e0b;
  --critical:  #f43f5e;
  --radius:    10px;
  --shadow:    0 4px 24px rgba(0,0,0,.45);
  --font:      'DM Sans', sans-serif;
  --mono:      'DM Mono', monospace;
}
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); }
a { color: inherit; text-decoration: none; }
button { font-family: var(--font); cursor: pointer; border: none; outline: none; }
input, textarea, select { font-family: var(--font); }

/* ── Scrollbar ─────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ── Layout ────────────────────────────────────────────────────────────── */
#app { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ───────────────────────────────────────────────────────────── */
.sidebar {
  width: 240px; min-width: 240px; background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 0; overflow-y: auto;
  transition: width .2s;
}
.sidebar-logo {
  padding: 20px 20px 16px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo .logo-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.sidebar-logo .logo-text { font-weight: 700; font-size: 17px; letter-spacing: -.3px; }
.sidebar-logo .logo-badge {
  margin-left: auto; font-size: 10px; background: var(--accent2);
  color: #fff; border-radius: 4px; padding: 2px 6px; font-weight: 600;
}
.sidebar-section { padding: 16px 12px 6px; }
.sidebar-section-title {
  font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--text-muted); padding: 0 8px 8px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 8px; cursor: pointer;
  font-size: 14px; font-weight: 500; color: var(--text-muted);
  transition: all .15s; position: relative;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: rgba(79,142,247,.13); color: var(--accent); }
.nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }
.nav-item .nav-badge {
  margin-left: auto; font-size: 10px; background: var(--danger);
  color: #fff; border-radius: 99px; padding: 1px 6px; font-weight: 700;
}
.nav-project-dot {
  width: 8px; height: 8px; border-radius: 99px; flex-shrink: 0;
}
.sidebar-user {
  margin-top: auto; padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 32px; height: 32px; border-radius: 99px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 11px; color: var(--text-muted); text-transform: capitalize; }
.btn-logout {
  background: none; color: var(--text-muted); font-size: 16px; padding: 4px;
  border-radius: 6px; transition: color .15s;
}
.btn-logout:hover { color: var(--danger); }

/* ── Main content ──────────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  padding: 16px 28px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); min-height: 64px;
}
.topbar-title { font-size: 18px; font-weight: 700; }
.topbar-actions { margin-left: auto; display: flex; gap: 8px; }
.page-content { flex: 1; overflow-y: auto; padding: 28px; }

/* ── Buttons ────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 600; transition: all .15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #3b7de0; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: rgba(244,63,94,.15); color: var(--danger); border: 1px solid rgba(244,63,94,.3); }
.btn-danger:hover { background: rgba(244,63,94,.25); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { padding: 7px; border-radius: 7px; background: var(--surface2); color: var(--text-muted); font-size: 15px; }
.btn-icon:hover { background: var(--border); color: var(--text); }

/* ── Cards & Grids ──────────────────────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden;
}
.stat-card::before {
  content:''; position: absolute; top:0; left:0; right:0; height:3px;
  background: var(--c, var(--accent));
}
.stat-value { font-size: 32px; font-weight: 700; font-family: var(--mono); margin-bottom: 4px; }
.stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.card-title { font-size: 14px; font-weight: 700; }

/* ── Project cards ──────────────────────────────────────────────────────── */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 16px; }
.project-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; cursor: pointer;
  transition: border-color .15s, transform .15s;
  position: relative; overflow: hidden;
}
.project-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
  background: var(--c, var(--accent));
}
.project-card:hover { border-color: var(--c, var(--accent)); transform: translateY(-2px); }
.project-card-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; padding-left: 8px; }
.project-card-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; padding-left: 8px; line-height: 1.5; }
.project-card-meta { display: flex; gap: 12px; padding-left: 8px; }
.project-meta-item { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }

/* ── Task board / table ─────────────────────────────────────────────────── */
.board { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
.board-col {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.board-col-header {
  padding: 12px 14px; font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .8px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.board-col-header .col-dot { width:8px; height:8px; border-radius:99px; }
.board-col-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; min-height: 120px; }
.task-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; cursor: pointer;
  transition: border-color .15s, transform .15s;
}
.task-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.task-card-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
.task-card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

/* ── Table view ─────────────────────────────────────────────────────────── */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; font-size: 11px; font-weight: 600; letter-spacing: .8px;
  text-transform: uppercase; color: var(--text-muted); padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.data-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--surface2); }

/* ── Badges ─────────────────────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 99px; font-size: 11px; font-weight: 600;
}
.badge-todo     { background: rgba(122,131,153,.15); color: var(--todo); }
.badge-inprog   { background: rgba(79,142,247,.15);  color: var(--inprog); }
.badge-review   { background: rgba(245,158,11,.15);  color: var(--review); }
.badge-done     { background: rgba(34,211,165,.15);  color: var(--done); }
.badge-low      { background: rgba(34,211,165,.15);  color: var(--low); }
.badge-medium   { background: rgba(79,142,247,.15);  color: var(--medium); }
.badge-high     { background: rgba(245,158,11,.15);  color: var(--high); }
.badge-critical { background: rgba(244,63,94,.15);   color: var(--critical); }
.badge-admin    { background: rgba(124,92,252,.15);  color: var(--accent2); }
.badge-member   { background: rgba(79,142,247,.1);   color: var(--accent); }

/* ── Forms ──────────────────────────────────────────────────────────────── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; letter-spacing: .4px; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; padding: 10px 12px;
  font-size: 14px; transition: border-color .15s; outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-error { font-size: 12px; color: var(--danger); margin-top: 4px; }

/* ── Modal ──────────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(3px);
  animation: fadeIn .15s;
}
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; width: 540px; max-width: 95vw; max-height: 90vh;
  overflow-y: auto; box-shadow: var(--shadow);
  animation: slideUp .2s;
}
.modal-lg { width: 700px; }
.modal-header {
  padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.modal-title { font-size: 16px; font-weight: 700; flex: 1; }
.modal-close { background: none; color: var(--text-muted); font-size: 20px; padding: 4px 8px; border-radius: 6px; }
.modal-close:hover { background: var(--surface2); color: var(--text); }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

/* ── Auth screen ────────────────────────────────────────────────────────── */
.auth-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 20% 50%, rgba(79,142,247,.08) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(124,92,252,.08) 0%, transparent 50%);
}
.auth-box {
  width: 420px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 36px; box-shadow: var(--shadow);
}
.auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.auth-logo .logo-icon {
  width: 40px; height: 40px; border-radius: 11px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.auth-logo .logo-name { font-size: 22px; font-weight: 800; letter-spacing: -.4px; }
.auth-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.auth-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
.auth-switch { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
.auth-switch a { color: var(--accent); font-weight: 600; cursor: pointer; }
.auth-error { background: rgba(244,63,94,.1); border: 1px solid rgba(244,63,94,.3); color: var(--danger); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }

/* ── Progress bar ───────────────────────────────────────────────────────── */
.progress-bar { background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .4s; }

/* ── Empty state ────────────────────────────────────────────────────────── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 14px; }
.empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.empty-state p { font-size: 13px; }

/* ── Toast ──────────────────────────────────────────────────────────────── */
#toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500;
  background: var(--surface); border: 1px solid var(--border);
  box-shadow: var(--shadow); animation: slideUp .2s;
  display: flex; align-items: center; gap: 8px;
}
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error   { border-color: var(--danger);  color: var(--danger); }

/* ── Overdue row ────────────────────────────────────────────────────────── */
.overdue-row td { color: var(--danger) !important; }
.overdue-row td:first-child { font-weight: 600; }

/* ── Tabs ───────────────────────────────────────────────────────────────── */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab {
  padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
  color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all .15s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text); }

/* ── Comment ────────────────────────────────────────────────────────────── */
.comment { display: flex; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.comment:last-child { border-bottom: none; }
.comment-body { flex: 1; }
.comment-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.comment-text { font-size: 13px; line-height: 1.5; }

/* ── Misc ───────────────────────────────────────────────────────────────── */
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.text-muted { color: var(--text-muted); }
.text-sm { font-size: 12px; }
.flex { display: flex; }
.flex-center { display: flex; align-items: center; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.mt-auto { margin-top: auto; }
.w-full { width: 100%; }
.mb-16 { margin-bottom: 16px; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.color-swatch {
  width: 26px; height: 26px; border-radius: 99px; cursor: pointer;
  border: 2px solid transparent; transition: transform .15s;
}
.color-swatch.selected, .color-swatch:hover { transform: scale(1.2); border-color: #fff; }
.member-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.member-row:last-child { border-bottom: none; }

@keyframes fadeIn  { from { opacity: 0 } to { opacity: 1 } }
@keyframes slideUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:none } }

/* ── Loading spinner ────────────────────────────────────────────────────── */
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .6s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg) } }
.page-loader { display:flex; align-items:center; justify-content:center; height:200px; }
</style>
</head>
<body>

<div id="app"></div>
<div id="toast-container"></div>

<script>
// ══════════════════════════════════════════════════════════════════
//  STATE & CONFIG
// ══════════════════════════════════════════════════════════════════
const API = '/api';
let state = {
  token: localStorage.getItem('tf_token'),
  user: null,
  page: 'dashboard',
  pageData: null,       // current project, task, etc.
  projects: [],
  overdueCnt: 0,
};

// ══════════════════════════════════════════════════════════════════
//  API HELPER
// ══════════════════════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (state.token) opts.headers['Authorization'] = 'Bearer ' + state.token;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || data.errors?.[0]?.msg || 'Request failed');
  return data;
}

// ══════════════════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════════════════
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${msg}`;
  document.getElementById('toast-container').append(el);
  setTimeout(() => el.remove(), 3000);
}

// ══════════════════════════════════════════════════════════════════
//  ROUTER
// ══════════════════════════════════════════════════════════════════
function navigate(page, data = null) {
  state.page = page;
  state.pageData = data;
  render();
}

function render() {
  if (!state.token || !state.user) {
    document.getElementById('app').innerHTML = renderAuthPage();
    bindAuth();
    return;
  }
  document.getElementById('app').innerHTML = `
    ${renderSidebar()}
    <div class="main">
      ${renderTopbar()}
      <div class="page-content" id="page-content">
        <div class="page-loader"><div class="spinner"></div></div>
      </div>
    </div>
  `;
  bindNav();
  loadPage();
}

// ══════════════════════════════════════════════════════════════════
//  AUTH PAGE
// ══════════════════════════════════════════════════════════════════
function renderAuthPage(mode = 'login') {
  const isLogin = mode !== 'signup';
  return `
  <div class="auth-screen" id="auth-screen" data-mode="${isLogin ? 'login' : 'signup'}">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-name">TaskFlow</div>
      </div>
      <div class="auth-title">${isLogin ? 'Welcome back' : 'Create account'}</div>
      <div class="auth-sub">${isLogin ? 'Sign in to your workspace' : 'Start managing your team today'}</div>
      <div id="auth-error" style="display:none" class="auth-error"></div>
      ${!isLogin ? `<div class="form-group">
        <label class="form-label">Full name</label>
        <input class="form-input" id="auth-name" placeholder="John Doe" />
      </div>` : ''}
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="auth-email" type="email" placeholder="you@company.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="auth-password" type="password" placeholder="••••••••" />
      </div>
      ${!isLogin ? `<div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-select" id="auth-role">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>
      </div>` : ''}
      <button class="btn btn-primary w-full" id="auth-submit" style="justify-content:center;padding:12px;">
        ${isLogin ? 'Sign in' : 'Create account'}
      </button>
      <div class="auth-switch">
        ${isLogin
          ? `Don't have an account? <a id="auth-toggle">Sign up</a>`
          : `Already have an account? <a id="auth-toggle">Sign in</a>`}
      </div>
    </div>
  </div>`;
}

function bindAuth() {
  document.getElementById('auth-toggle')?.addEventListener('click', () => {
    const mode = document.getElementById('auth-screen').dataset.mode;
    document.getElementById('app').innerHTML = renderAuthPage(mode === 'login' ? 'signup' : 'login');
    bindAuth();
  });
  document.getElementById('auth-submit')?.addEventListener('click', handleAuth);
  document.getElementById('auth-password')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleAuth();
  });
}

async function handleAuth() {
  const mode = document.getElementById('auth-screen').dataset.mode;
  const isLogin = mode === 'login';
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';

  try {
    let data;
    if (isLogin) {
      data = await api('POST', '/auth/login', { email, password });
    } else {
      const name = document.getElementById('auth-name').value.trim();
      const role = document.getElementById('auth-role').value;
      data = await api('POST', '/auth/signup', { name, email, password, role });
    }
    state.token = data.token;
    state.user = data.user;
    localStorage.setItem('tf_token', data.token);
    render();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

function bindNav() {
  document.querySelectorAll('[data-nav]').forEach(el => {

        navigate('project', project);
      } else {
        navigate(nav);

    state.token = null; state.user = null;

  const titles = {

//  PAGE LOADER
// ══════════════════════════════════════════════════════════════════
async function loadPage() {
  // Always refresh projects for sidebar
  try {
    state.projects = await api('GET', '/projects');
  } catch {}

  const content = document.getElementById('page-content');
  try {
    switch (state.page) {
      case 'dashboard': await loadDashboard(content); break;
      case 'projects':  await loadProjects(content); break;
      case 'project':   await loadProject(content); break;
      case 'my-tasks':  await loadMyTasks(content); break;
      case 'admin':     await loadAdmin(content); break;
    }
  } catch (e) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠</div><h3>Error</h3><p>${e.message}</p></div>`;
  }
  // Refresh sidebar project list
  document.querySelector('.sidebar').outerHTML = renderSidebar();
  bindNav();
}

//  DASHBOARD
// ══════════════════════════════════════════════════════════════════
async function loadDashboard(content) {
  const data = await api('GET', '/dashboard');

  state.overdueCnt = s.overdue || 0;

  const pct = s.total_tasks > 0 ? Math.round((s.completed / s.total_tasks) * 100) : 0;

  content.innerHTML = `
    <div class="stats-grid">
      ${statCard('Total Tasks', s.total_tasks, '#4f8ef7')}
      ${statCard('Completed', s.completed, '#22d3a5')}
      ${statCard('In Progress', s.in_progress, '#4f8ef7')}
      ${statCard('Overdue', s.overdue, '#f43f5e')}
      ${statCard('Projects', s.projectCount, '#7c5cfc')}
      ${statCard('Team Members', s.memberCount, '#f59e0b')}
    </div>

    <div class="two-col mb-16">
      <div class="card">
        <div class="card-header"><div class="card-title">📊 Progress Overview</div></div>
        <div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:6px">
            <span>Overall Completion</span><span>${pct}%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px">
          ${miniStat('Todo', s.todo, 'var(--todo)')}
          ${miniStat('In Progress', s.in_progress, 'var(--inprog)')}
          ${miniStat('Review', s.review, 'var(--review)')}
          ${miniStat('Done', s.completed, 'var(--done)')}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">📌 My Tasks</div></div>
        ${data.myTasks.length === 0
          ? '<div class="empty-state" style="padding:20px"><p>No tasks assigned to you</p></div>'
          : data.myTasks.map(t => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:12px">${priorityDot(t.priority)}</span>
              <span style="flex:1;font-size:13px;font-weight:500">${t.title}</span>
              ${statusBadge(t.status)}
              ${t.due_date ? `<span style="font-size:11px;color:${isOverdue(t.due_date)?'var(--danger)':'var(--text-muted)'}">${fmtDate(t.due_date)}</span>` : ''}
            </div>`).join('')}
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-header">
          <div class="card-title">🚨 Overdue Tasks</div>
          ${data.overdue.length > 0 ? `<span class="badge badge-critical">${data.overdue.length}</span>` : ''}
        </div>
        ${data.overdue.length === 0
          ? '<div class="empty-state" style="padding:20px"><div class="empty-icon">🎉</div><p>No overdue tasks!</p></div>'
          : `<table class="data-table">
              <thead><tr><th>Task</th><th>Project</th><th>Due</th></tr></thead>
              <tbody>${data.overdue.map(t => `
                <tr class="overdue-row">
                  <td>${t.title}</td>
                  <td><span class="badge" style="background:${t.project_color}22;color:${t.project_color}">${t.project_name}</span></td>
                  <td>${fmtDate(t.due_date)}</td>
                </tr>`).join('')}</tbody>
             </table>`}
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">🕐 Recent Activity</div></div>
        ${data.recentTasks.length === 0
          ? '<div class="empty-state" style="padding:20px"><p>No recent tasks</p></div>'
          : data.recentTasks.map(t => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
              ${statusBadge(t.status)}
              <span style="flex:1;font-size:13px">${t.title}</span>
              <span style="font-size:11px;color:var(--text-muted)">${fmtDate(t.created_at)}</span>

function statCard(label, value, color) {
  return `<div class="stat-card" style="--c:${color}">
    <div class="stat-value" style="color:${color}">${value ?? 0}</div>
    <div class="stat-label">${label}</div>
  </div>`;
}
function miniStat(label, value, color) {
  return `<div style="background:var(--surface2);border-radius:8px;padding:10px">
    <div style="font-size:20px;font-weight:700;color:${color};font-family:var(--mono)">${value ?? 0}</div>
    <div style="font-size:11px;color:var(--text-muted)">${label}</div>
  </div>`;
}

const PROJECT_COLORS = ['#6366f1','#4f8ef7','#7c5cfc','#22d3a5','#f59e0b','#f43f5e','#10b981','#ec4899'];

function openProjectModal(existing = null) {
  const modal = createModal(existing ? 'Edit Project' : 'New Project', `
    <div class="form-group">
      <label class="form-label">Project Name *</label>
      <input class="form-input" id="proj-name" value="${existing?.name || ''}" placeholder="e.g. Website Redesign" />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="proj-desc" placeholder="What's this project about?">${existing?.description || ''}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Color</label>
      <div class="color-picker">
        ${PROJECT_COLORS.map(c => `<div class="color-swatch ${(existing?.color || '#6366f1') === c ? 'selected' : ''}"
          style="background:${c}" data-color="${c}"></div>`).join('')}
      </div>
    </div>
  `, async () => {
    const name = document.getElementById('proj-name').value.trim();
    if (!name) { toast('Project name is required', 'error'); return; }
    const color = document.querySelector('.color-swatch.selected')?.dataset.color || '#6366f1';
    const description = document.getElementById('proj-desc').value.trim();
    try {
      if (existing) {
        await api('PUT', `/projects/${existing.id}`, { name, description, color });
        toast('Project updated');
      } else {
        await api('POST', '/projects', { name, description, color });
        toast('Project created');
      }
      closeModal(); navigate('projects');
    } catch (e) { toast(e.message, 'error'); }
  });

  modal.querySelectorAll('.color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      modal.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
    });
  });
}

// ══════════════════════════════════════════════════════════════════
//  PROJECT DETAIL
// ══════════════════════════════════════════════════════════════════
async function loadProject(content) {
  if (!state.pageData) { navigate('projects'); return; }
  const pid = state.pageData.id;
  const [project, tasks] = await Promise.all([
    api('GET', `/projects/${pid}`),
    api('GET', `/projects/${pid}/tasks`),
  ]);

  // User's role in this project
  const myMembership = project.members.find(m => m.id === state.user.id);
  const isProjectAdmin = state.user.role === 'admin' || myMembership?.project_role === 'admin';

  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-secondary btn-sm" id="btn-view-board">🗂 Board</button>
    <button class="btn btn-secondary btn-sm" id="btn-view-list">☰ List</button>
    ${isProjectAdmin ? `<button class="btn btn-secondary btn-sm" id="btn-project-settings">⚙ Settings</button>` : ''}
    <button class="btn btn-primary btn-sm" id="btn-new-task">+ New Task</button>
  `;
  document.getElementById('btn-new-task')?.addEventListener('click', () => openTaskModal(pid, project.members));
  document.getElementById('btn-project-settings')?.addEventListener('click', () => openProjectSettings(project));

  let viewMode = 'board';
  const renderView = () => {
    const taskArea = document.getElementById('task-area');
    if (viewMode === 'board') {
      taskArea.innerHTML = renderBoard(tasks);
      taskArea.querySelectorAll('.task-card').forEach(el => {
        el.addEventListener('click', () => openTaskDetail(pid, el.dataset.tid, project.members, isProjectAdmin));
      });
    } else {
      taskArea.innerHTML = renderTaskList(tasks);
      taskArea.querySelectorAll('[data-tid]').forEach(el => {
        el.addEventListener('click', () => openTaskDetail(pid, el.dataset.tid, project.members, isProjectAdmin));
      });
    }
  };

  content.innerHTML = `
    <div style="margin-bottom:20px;display:flex;align-items:center;gap:12px">
      <div style="width:12px;height:12px;border-radius:99px;background:${project.color}"></div>
      <span style="font-size:14px;color:var(--text-muted)">${project.description || 'No description'}</span>
      <span style="margin-left:auto;font-size:13px;color:var(--text-muted)">
        ${tasks.length} tasks · ${project.members.length} members
      </span>
    </div>
    <div id="task-area"></div>
  `;

  document.getElementById('btn-view-board').addEventListener('click', () => { viewMode = 'board'; renderView(); });
  document.getElementById('btn-view-list').addEventListener('click',  () => { viewMode = 'list';  renderView(); });
  renderView();
}

function renderBoard(tasks) {
  const cols = [
    { key: 'todo',        label: 'To Do',       color: 'var(--todo)' },
    { key: 'in_progress', label: 'In Progress',  color: 'var(--inprog)' },
    { key: 'review',      label: 'Review',       color: 'var(--review)' },
    { key: 'done',        label: 'Done',         color: 'var(--done)' },
  ];
  return `<div class="board">
    ${cols.map(col => {
      const colTasks = tasks.filter(t => t.status === col.key);
      return `<div class="board-col">
        <div class="board-col-header">
          <span class="col-dot" style="background:${col.color}"></span>
          ${col.label}
          <span style="margin-left:auto;font-size:11px;color:var(--text-muted)">${colTasks.length}</span>
        </div>
        <div class="board-col-body">
          ${colTasks.length === 0 ? '<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:12px">Empty</div>' : ''}
          ${colTasks.map(t => `
            <div class="task-card" data-tid="${t.id}">
              <div class="task-card-title">${t.title}</div>
              <div class="task-card-meta">
                ${priorityBadge(t.priority)}
                ${t.assignee_name ? `<span style="font-size:11px;color:var(--text-muted)">→ ${t.assignee_name}</span>` : ''}
                ${t.due_date ? `<span style="font-size:11px;color:${isOverdue(t.due_date) && t.status !== 'done' ? 'var(--danger)' : 'var(--text-muted)'};margin-left:auto">${fmtDate(t.due_date)}</span>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderTaskList(tasks) {
  if (tasks.length === 0) return `<div class="empty-state"><div class="empty-icon">✓</div><h3>No tasks yet</h3><p>Create your first task</p></div>`;
  return `<div class="card" style="padding:0">
    <table class="data-table">
      <thead><tr><th>Task</th><th>Status</th><th>Priority</th><th>Assignee</th><th>Due Date</th></tr></thead>
      <tbody>
        ${tasks.map(t => `
          <tr data-tid="${t.id}" style="cursor:pointer" class="${isOverdue(t.due_date) && t.status !== 'done' ? 'overdue-row' : ''}">
            <td><span style="font-weight:600">${t.title}</span>${t.description ? `<div style="font-size:12px;color:var(--text-muted);margin-top:2px">${t.description.slice(0,60)}${t.description.length > 60 ? '…' : ''}</div>` : ''}</td>
            <td>${statusBadge(t.status)}</td>
            <td>${priorityBadge(t.priority)}</td>
            <td>${t.assignee_name ? `<span style="font-size:13px">${t.assignee_name}</span>` : '<span class="text-muted">—</span>'}</td>
            <td style="font-size:12px">${t.due_date ? fmtDate(t.due_date) : '—'}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

//  TASK MODAL — CREATE

    </div>

    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="task-status">
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="review">Review</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="task-priority">
          <option value="low">Low</option>

          <option value="high">High</option>

        </select>

    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Assignee</label>
        <select class="form-select" id="task-assignee">
          <option value="">Unassigned</option>
          ${members.map(m => `<option value="${m.id}">${m.name}</option>`).join('')}
        </select>

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal modal-lg">
      <div class="modal-header">
        <div class="modal-title">${task.title}</div>
        <button class="modal-close" id="modal-close-btn">✕</button>
      </div>
      <div class="modal-body">
        <div class="two-col" style="margin-bottom:16px">
          <div>
            <div class="form-label">Status</div>
            ${canEdit ? `<select class="form-select" id="edit-status">
              <option value="todo" ${task.status==='todo'?'selected':''}>To Do</option>
              <option value="in_progress" ${task.status==='in_progress'?'selected':''}>In Progress</option>
              <option value="review" ${task.status==='review'?'selected':''}>Review</option>
              <option value="done" ${task.status==='done'?'selected':''}>Done</option>
            </select>` : statusBadge(task.status)}
          </div>
          <div>
            <div class="form-label">Priority</div>
            ${canEdit ? `<select class="form-select" id="edit-priority">
              <option value="low" ${task.priority==='low'?'selected':''}>Low</option>
              <option value="medium" ${task.priority==='medium'?'selected':''}>Medium</option>
              <option value="high" ${task.priority==='high'?'selected':''}>High</option>
              <option value="critical" ${task.priority==='critical'?'selected':''}>Critical</option>
            </select>` : priorityBadge(task.priority)}
          </div>
        </div>
        <div class="two-col" style="margin-bottom:16px">
          <div>
            <div class="form-label">Assignee</div>
            ${canEdit ? `<select class="form-select" id="edit-assignee">
              <option value="">Unassigned</option>
              ${members.map(m => `<option value="${m.id}" ${task.assignee_id===m.id?'selected':''}>${m.name}</option>`).join('')}
            </select>` : `<span>${task.assignee_name || 'Unassigned'}</span>`}
          </div>
          <div>
            <div class="form-label">Due Date</div>
            ${canEdit ? `<input class="form-input" id="edit-due" type="date" value="${task.due_date||''}" />` : `<span>${task.due_date ? fmtDate(task.due_date) : '—'}</span>`}
          </div>
        </div>
        <div class="form-group">
          <div class="form-label">Description</div>
          ${canEdit ? `<textarea class="form-textarea" id="edit-desc">${task.description || ''}</textarea>`
            : `<p style="font-size:13px;color:var(--text-muted)">${task.description || 'No description'}</p>`}
        </div>
        <div class="divider"></div>
        <div class="card-title" style="margin-bottom:12px">💬 Comments (${task.comments?.length || 0})</div>
        <div id="comments-list">
          ${(task.comments || []).map(c => `
            <div class="comment">
              <div class="user-avatar" style="width:28px;height:28px;font-size:11px">${c.user_name[0]}</div>
              <div class="comment-body">
                <div class="comment-meta">${c.user_name} · ${fmtDate(c.created_at)}</div>
                <div class="comment-text">${c.body}</div>
              </div>
            </div>`).join('') || '<p style="font-size:13px;color:var(--text-muted)">No comments yet</p>'}
        </div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <input class="form-input" id="comment-input" placeholder="Add a comment..." style="flex:1" />
          <button class="btn btn-secondary" id="btn-comment">Post</button>
        </div>
      </div>
      <div class="modal-footer">
        ${isProjectAdmin ? `<button class="btn btn-danger btn-sm" id="btn-delete-task">Delete Task</button>` : ''}
        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
        ${canEdit ? `<button class="btn btn-primary" id="btn-save-task">Save Changes</button>` : ''}
      </div>
    </div>`;

  document.body.append(modal);

  modal.querySelector('#modal-close-btn').onclick = () => modal.remove();
  modal.querySelector('#modal-cancel').onclick = () => modal.remove();

  modal.querySelector('#btn-save-task')?.addEventListener('click', async () => {
    try {
      await api('PUT', `/projects/${pid}/tasks/${tid}`, {
        status: document.getElementById('edit-status')?.value,
        priority: document.getElementById('edit-priority')?.value,
        assignee_id: document.getElementById('edit-assignee')?.value || null,
        due_date: document.getElementById('edit-due')?.value || null,
        description: document.getElementById('edit-desc')?.value || null,
      });
      toast('Task updated'); modal.remove(); loadPage();
    } catch (e) { toast(e.message, 'error'); }
  });

  modal.querySelector('#btn-delete-task')?.addEventListener('click', async () => {
    if (!confirm('Delete this task?')) return;
    try {
      await api('DELETE', `/projects/${pid}/tasks/${tid}`);
      toast('Task deleted'); modal.remove(); loadPage();
    } catch (e) { toast(e.message, 'error'); }
  });

  modal.querySelector('#btn-comment').addEventListener('click', async () => {
    const body = document.getElementById('comment-input').value.trim();
    if (!body) return;
    try {
      const comment = await api('POST', `/projects/${pid}/tasks/${tid}/comments`, { body });
      const list = document.getElementById('comments-list');
      if (list.querySelector('p')) list.innerHTML = '';
      const el = document.createElement('div');
      el.className = 'comment';
      el.innerHTML = `
        <div class="user-avatar" style="width:28px;height:28px;font-size:11px">${comment.user_name[0]}</div>
        <div class="comment-body">
          <div class="comment-meta">${comment.user_name} · just now</div>
          <div class="comment-text">${comment.body}</div>
        </div>`;
      list.append(el);
      document.getElementById('comment-input').value = '';
    } catch (e) { toast(e.message, 'error'); }
  });

  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

// ══════════════════════════════════════════════════════════════════
//  PROJECT SETTINGS MODAL
// ══════════════════════════════════════════════════════════════════
async function openProjectSettings(project) {
  const members = project.members;

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal modal-lg">
      <div class="modal-header">
        <div class="modal-title">⚙ Project Settings — ${project.name}</div>
        <button class="modal-close" id="ps-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="tabs">
          <div class="tab active" data-tab="general">General</div>
          <div class="tab" data-tab="members">Members</div>
          <div class="tab" data-tab="danger">Danger</div>
        </div>
        <div id="tab-general">
          <div class="form-group">
            <label class="form-label">Project Name</label>
            <input class="form-input" id="ps-name" value="${project.name}" />
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea class="form-textarea" id="ps-desc">${project.description || ''}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Color</label>
            <div class="color-picker">
              ${PROJECT_COLORS.map(c => `<div class="color-swatch ${project.color === c ? 'selected' : ''}"
                style="background:${c}" data-color="${c}"></div>`).join('')}
            </div>
          </div>
          <button class="btn btn-primary" id="ps-save">Save Changes</button>
        </div>
        <div id="tab-members" style="display:none">
          <div id="members-list">
            ${members.map(m => `
              <div class="member-row" data-mid="${m.id}">
                <div class="user-avatar" style="width:30px;height:30px;font-size:12px">${m.name[0]}</div>
                <div style="flex:1">
                  <div style="font-size:13px;font-weight:600">${m.name}</div>
                  <div style="font-size:12px;color:var(--text-muted)">${m.email}</div>
                </div>
                <span class="badge badge-${m.project_role}">${m.project_role}</span>
                ${m.id !== state.user.id ? `<button class="btn btn-danger btn-sm remove-member" data-mid="${m.id}">Remove</button>` : ''}
              </div>`).join('')}
          </div>
          <div class="divider"></div>
          <div class="form-label">Add Member by Email</div>
          <div style="display:flex;gap:8px">
            <input class="form-input" id="add-member-email" placeholder="user@email.com" style="flex:1" />
            <select class="form-select" id="add-member-role" style="width:120px">
              <option value="member">Member</option>
              <option value="admin">Admin</option>
            </select>
            <button class="btn btn-primary" id="btn-add-member">Add</button>
          </div>
        </div>
        <div id="tab-danger" style="display:none">
          <div style="background:rgba(244,63,94,.05);border:1px solid rgba(244,63,94,.2);border-radius:10px;padding:20px">
            <h3 style="color:var(--danger);margin-bottom:8px">Delete Project</h3>
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px">
              This will permanently delete the project and all its tasks. This action cannot be undone.
            </p>
            <button class="btn btn-danger" id="btn-delete-project">Delete Project</button>
          </div>
        </div>
      </div>
    </div>`;

  document.body.append(modal);

  modal.querySelector('#ps-close').onclick = () => modal.remove();
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

  // Tabs
  modal.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      modal.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      ['general','members','danger'].forEach(t => {
        modal.querySelector(`#tab-${t}`).style.display = t === tab.dataset.tab ? '' : 'none';
      });
    });
  });

  // Color picker
  modal.querySelectorAll('.color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      modal.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
    });
  });

  // Save settings
  modal.querySelector('#ps-save').addEventListener('click', async () => {
    try {
      await api('PUT', `/projects/${project.id}`, {
        name: document.getElementById('ps-name').value.trim(),
        description: document.getElementById('ps-desc').value.trim(),
        color: modal.querySelector('.color-swatch.selected')?.dataset.color,
      });
      toast('Project updated'); modal.remove(); loadPage();
    } catch (e) { toast(e.message, 'error'); }
  });

  // Add member
  modal.querySelector('#btn-add-member').addEventListener('click', async () => {
    const email = document.getElementById('add-member-email').value.trim();
    const role  = document.getElementById('add-member-role').value;
    if (!email) return;
    try {
      await api('POST', `/projects/${project.id}/members`, { email, role });
      toast('Member added'); modal.remove(); loadPage();
    } catch (e) { toast(e.message, 'error'); }
  });

  // Remove members
  modal.querySelectorAll('.remove-member').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Remove this member?')) return;
      try {
        await api('DELETE', `/projects/${project.id}/members/${btn.dataset.mid}`);
        toast('Member removed'); modal.remove(); loadPage();
      } catch (e) { toast(e.message, 'error'); }
    });
  });

  // Delete project
  modal.querySelector('#btn-delete-project')?.addEventListener('click', async () => {
    if (!confirm(`Delete "${project.name}"? This cannot be undone.`)) return;
    try {
      await api('DELETE', `/projects/${project.id}`);
      toast('Project deleted'); modal.remove(); navigate('projects');
    } catch (e) { toast(e.message, 'error'); }
  });
}

// ══════════════════════════════════════════════════════════════════
//  MY TASKS
// ══════════════════════════════════════════════════════════════════
async function loadMyTasks(content) {
  const data = await api('GET', '/dashboard');
  document.getElementById('topbar-actions').innerHTML = '';

  const allMyTasks = [...(data.myTasks || [])];

  if (allMyTasks.length === 0) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">✓</div><h3>All caught up!</h3><p>No tasks assigned to you right now.</p></div>`;
    return;
  }

  content.innerHTML = `<div class="card" style="padding:0">
    <table class="data-table">
      <thead><tr><th>Task</th><th>Project</th><th>Status</th><th>Priority</th><th>Due Date</th></tr></thead>
      <tbody>
        ${allMyTasks.map(t => `
          <tr class="${isOverdue(t.due_date) && t.status !== 'done' ? 'overdue-row' : ''}">
            <td style="font-weight:600">${t.title}</td>
            <td><span class="badge" style="background:${t.project_color}22;color:${t.project_color}">${t.project_name}</span></td>
            <td>${statusBadge(t.status)}</td>
            <td>${priorityBadge(t.priority)}</td>
            <td style="font-size:12px">${t.due_date ? fmtDate(t.due_date) : '—'}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

// ══════════════════════════════════════════════════════════════════
//  MODAL HELPERS
// ══════════════════════════════════════════════════════════════════
function createModal(title, bodyHTML, onConfirm) {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'active-modal';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">${title}</div>
        <button class="modal-close" id="modal-close-btn">✕</button>
      </div>
      <div class="modal-body">${bodyHTML}</div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-confirm">Confirm</button>
      </div>
    </div>`;
  document.body.append(modal);
  modal.querySelector('#modal-close-btn').onclick = closeModal;
  modal.querySelector('#modal-cancel').onclick    = closeModal;
  modal.querySelector('#modal-confirm').onclick   = onConfirm;
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  return modal;
}

function closeModal() {
  document.getElementById('active-modal')?.remove();
}

// ══════════════════════════════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════════════════════════════
function statusBadge(s) {
  const map = { todo:'badge-todo', in_progress:'badge-inprog', review:'badge-review', done:'badge-done' };
  const labels = { todo:'To Do', in_progress:'In Progress', review:'Review', done:'Done' };
  return `<span class="badge ${map[s]}">${labels[s] || s}</span>`;
}
function priorityBadge(p) {
  const map = { low:'badge-low', medium:'badge-medium', high:'badge-high', critical:'badge-critical' };
  return `<span class="badge ${map[p]}">${p.charAt(0).toUpperCase()+p.slice(1)}</span>`;
}
function priorityDot(p) {
  const colors = { low:'var(--low)', medium:'var(--medium)', high:'var(--high)', critical:'var(--critical)' };
  return `<span style="display:inline-block;width:8px;height:8px;border-radius:99px;background:${colors[p]}"></span>`;
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
function isOverdue(d) {
  if (!d) return false;
  return new Date(d) < new Date(new Date().toDateString());
}

// ══════════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════════
async function boot() {
  if (state.token) {
    try {
      const { user } = await api('GET', '/auth/me');
      state.user = user;
    } catch {
      state.token = null;
      localStorage.removeItem('tf_token');
    }
  }
  render();
}

boot();
</script>
